<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Blue background - official EU blue -->
  <rect width="16" height="16" fill="#003399"/>
  
  <!-- 12 gold stars in a perfect circle centered at (8, 8) - official EU gold -->
  <g fill="#FFCC00" transform="translate(8, 8)">
    <!-- Star 1 (0°) - top -->
    <g transform="translate(0, -5.5)"><polygon points="0,-0.7 0.22,-0.22 0.7,-0.22 0.28,0.1 0.44,0.58 0,0.22 -0.44,0.58 -0.28,0.1 -0.7,-0.22 -0.22,-0.22"/></g>
    <!-- Star 2 (30°) -->
    <g transform="rotate(30) translate(0, -5.5)"><polygon points="0,-0.7 0.22,-0.22 0.7,-0.22 0.28,0.1 0.44,0.58 0,0.22 -0.44,0.58 -0.28,0.1 -0.7,-0.22 -0.22,-0.22"/></g>
    <!-- Star 3 (60°) -->
