    <!-- Star 6 (150°) -->
    <g transform="rotate(150) translate(0, -5.5)"><polygon points="0,-0.7 0.22,-0.22 0.7,-0.22 0.28,0.1 0.44,0.58 0,0.22 -0.44,0.58 -0.28,0.1 -0.7,-0.22 -0.22,-0.22"/></g>
    <!-- Star 7 (180°) - bottom -->
    <g transform="rotate(180) translate(0, -5.5)"><polygon points="0,-0.7 0.22,-0.22 0.7,-0.22 0.28,0.1 0.44,0.58 0,0.22 -0.44,0.58 -0.28,0.1 -0.7,-0.22 -0.22,-0.22"/></g>
    <!-- Star 8 (210°) -->
    <g transform="rotate(210) translate(0, -5.5)"><polygon points="0,-0.7 0.22,-0.22 0.7,-0.22 0.28,0.1 0.44,0.58 0,0.22 -0.44,0.58 -0.28,0.1 -0.7,-0.22 -0.22,-0.22"/></g>
    <!-- Star 9 (240°) -->
    <g transform="rotate(240) translate(0, -5.5)"><polygon points="0,-0.7 0.22,-0.22 0.7,-0.22 0.28,0.1 0.44,0.58 0,0.22 -0.44,0.58 -0.28,0.1 -0.7,-0.22 -0.22,-0.22"/></g>
    <!-- Star 10 (270°) - left -->
    <g transform="rotate(270) translate(0, -5.5)"><polygon points="0,-0.7 0.22,-0.22 0.7,-0.22 0.28,0.1 0.44,0.58 0,0.22 -0.44,0.58 -0.28,0.1 -0.7,-0.22 -0.22,-0.22"/></g>
